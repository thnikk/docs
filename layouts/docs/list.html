{{ define "main" }}
  <div class="page-container">
    {{ partial "sidebar.html" . }}
    <article class="content">
      <main id="content" class="card">
        <div class="card-header">
          {{ if .Title }}
            <h1>{{ .Title }}</h1>
          {{ end }}
          <div class="card-meta">
            {{ partial "breadcrumb.html" . }}
            {{ with .Lastmod }}<span class="last-updated">Last updated {{ . | time.Format "January 2, 2006" }}</span>{{ end }}
          </div>
        </div>
        <div class="content-body">
          {{ .Content }}
        </div>
      </main>
    </article>
    {{ partial "toc.html" . }}
  </div>
{{ end }}
